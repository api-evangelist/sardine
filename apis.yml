aid: sardine
name: Sardine
description: Sardine is an agentic financial crime platform offering fraud prevention,
  AML compliance, and transaction monitoring through a unified REST API. The platform
  provides real-time device intelligence, behavior biometrics, transaction risk scoring,
  KYC/KYB identity verification, AML screening, and chargeback protection for banks,
  fintechs, and commerce at enterprise scale.
