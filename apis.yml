apis:
- aid: sardine:sardine-api
  name: Sardine API
  description: The Sardine REST API enables real-time fraud detection and compliance
    across the customer lifecycle. Core API categories include Device APIs for device
    fingerprinting and behavioral biometrics, Customer APIs for identity risk scoring
    and KYC/KYB verification, Crypto APIs for on-ramp/off-ramp fraud prevention, Issuing
    APIs for card fraud detection, and Transaction Monitoring APIs for AML compliance
    and sanctions screening.
