}

input EvidenceInput {
  type: EvidenceType!
  description: String
  fileUrl: String
}

input CreateCaseInput {
  title: String!
  type: CaseType!
  priority: Priority!
  customerId: String
  transactionId: String
  description: String
}

input UpdateCaseInput {
  title: String
  priority: Priority
  assignedTo: String
  status: CaseStatus
}

input CreateRuleInput {
  name: String!
  description: String
  type: RuleType!
  conditions: [RuleConditionInput!]!
  action: RuleActionInput!
  priority: Int!
}

input UpdateRuleInput {
  name: String
  description: String
  conditions: [RuleConditionInput!]
  action: RuleActionInput
  priority: Int
  status: RuleStatus
}

input RuleConditionInput {
  field: String!
  operator: RuleOperator!
  value: String!
  logicalOperator: LogicalOperator
}

input RuleActionInput {
  type: RuleActionType!
  parameters: [RuleActionParameterInput!]
}

input RuleActionParameterInput {
  key: String!
  value: String!
}

input CreateWebhookInput {
  url: String!
  events: [WebhookEvent!]!
  secret: String
}

input CustomerFilter {
  email: String
  kycStatus: KYCStatus
  riskLevel: RiskLevel
  createdAfter: String
  createdBefore: String
}

input TransactionFilter {
  customerId: String
  type: TransactionType
  status: TransactionStatus
  riskLevel: RiskLevel
  currency: String
  amountMin: Float
  amountMax: Float
  createdAfter: String
  createdBefore: String
}

input ChargebackFilter {
  customerId: String
  status: ChargebackStatus
  reason: ChargebackReason
